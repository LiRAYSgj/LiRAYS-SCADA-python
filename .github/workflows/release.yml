name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  verify-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag version
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep '^version\s*=\s*"' Cargo.toml | head -n1 | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          if [ "$CARGO_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "Tag version (${{ steps.tag.outputs.version }}) does not match Cargo.toml version ($CARGO_VERSION)."
            exit 1
          fi

      - name: Verify pyproject.toml version matches tag
        run: |
          PY_VERSION=$(grep '^version\s*=\s*"' pyproject.toml | head -n1 | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          if [ "$PY_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "Tag version (${{ steps.tag.outputs.version }}) does not match pyproject.toml version ($PY_VERSION)."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin build

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - name: Validate artifacts
        run: ls -la dist

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [verify-release, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    environment: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin build

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - name: Publish to PyPI (Trusted Publishing/OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
